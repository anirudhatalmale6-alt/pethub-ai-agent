version: "3.9"

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  backend:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:application --host 0.0.0.0 --port 8000 --workers 4
      "
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          memory: 1G
