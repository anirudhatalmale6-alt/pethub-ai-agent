# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  backend:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    command: >
      sh -c "
        PYTHONPATH=/app alembic upgrade head &&
        uvicorn app.main:application --host 0.0.0.0 --port 8000 --workers 2 --limit-concurrency 50
      "
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  frontend:
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
