version: "3.9"

# Staging overrides — use with: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  backend:
    environment:
      ENVIRONMENT: staging
      DEBUG: "true"
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
